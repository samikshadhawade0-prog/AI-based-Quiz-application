<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Quiz App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/ui-system.css') }}" rel="stylesheet">
</head>
<body class="app-bg theme-{{ session.get('theme_mode', 'light') }} font-{{ session.get('font_scale', 'medium') }}">
<div class="auth-shell">
    <div class="glass-card auth-card">
        <h1 class="auth-title">Welcome Back</h1>
        <p class="auth-subtitle">Login to continue to your quiz workspace.</p>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            <div class="alert alert-warning text-center">{{ messages[0] }}</div>
          {% endif %}
        {% endwith %}

        <form method="post" class="d-grid gap-3">
            <div>
                <label class="form-label fw-semibold">Email</label>
                <input type="email" name="email" class="form-control form-control-lg" placeholder="name@example.com" required>
            </div>
            <div>
                <label class="form-label fw-semibold">Password</label>
                <input type="password" name="password" class="form-control form-control-lg" placeholder="Enter password" required>
            </div>
            <button class="btn btn-brand btn-lg w-100">Login</button>
        </form>

        <div class="mt-3 text-center">
            <a href="/register" class="text-decoration-none">Create new account</a>
        </div>
    </div>
</div>
</body>
</html>
