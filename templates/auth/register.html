<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register - Quiz App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/ui-system.css') }}" rel="stylesheet">
</head>
<body class="app-bg theme-{{ session.get('theme_mode', 'light') }} font-{{ session.get('font_scale', 'medium') }}">
<div class="auth-shell">
    <div class="glass-card auth-card">
        <h1 class="auth-title">Create Account</h1>
        <p class="auth-subtitle">Register as teacher or student to start using the platform.</p>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            <div class="alert alert-warning text-center">{{ messages[0] }}</div>
          {% endif %}
        {% endwith %}

        <form action="{{ url_for('register') }}" method="POST" class="d-grid gap-3">
            <div>
                <label class="form-label fw-semibold">Full Name</label>
                <input type="text" name="username" class="form-control form-control-lg" placeholder="Enter full name" required>
            </div>
            <div>
                <label class="form-label fw-semibold">Email</label>
                <input type="email" name="email" class="form-control form-control-lg" placeholder="name@example.com" required>
            </div>
            <div>
                <label class="form-label fw-semibold">Password</label>
                <input type="password" name="password" class="form-control form-control-lg" placeholder="Use strong password" required>
            </div>
            <div>
                <label class="form-label fw-semibold">Role</label>
                <select id="roleSelect" name="role" class="form-select form-select-lg" required>
                    <option value="">Select Role</option>
                    <option value="Student">Student</option>
                    <option value="Teacher">Teacher</option>
                </select>
            </div>
            <div id="departmentField" style="display:none;">
                <label class="form-label fw-semibold">Department (Students only)</label>
                <select id="departmentSelect" name="department" class="form-select form-select-lg">
                    <option value="">Select Department</option>
                    <option value="Computer">Computer</option>
                    <option value="Mechanical">Mechanical</option>
                    <option value="Electrical">Electrical</option>
                    <option value="Civil">Civil</option>
                </select>
            </div>
            <div>
                <label class="form-label fw-semibold">Security Check: {{ a }} + {{ b }} = ?</label>
                <input type="number" name="captcha" class="form-control form-control-lg" placeholder="Enter answer">
            </div>

            <button type="submit" class="btn btn-success-solid btn-lg w-100">Register</button>
        </form>

        <div class="mt-3 text-center">
            <a href="/login" class="text-decoration-none">Already have an account? Login</a>
        </div>
    </div>
</div>

<script>
const roleSelect = document.getElementById('roleSelect');
const departmentField = document.getElementById('departmentField');
const departmentSelect = document.getElementById('departmentSelect');

function toggleDepartmentField() {
    if (roleSelect.value === 'Student') {
        departmentField.style.display = 'block';
        departmentSelect.required = true;
    } else {
        departmentField.style.display = 'none';
        departmentSelect.required = false;
        departmentSelect.value = '';
    }
}

roleSelect.addEventListener('change', toggleDepartmentField);
toggleDepartmentField();
</script>
</body>
</html>
