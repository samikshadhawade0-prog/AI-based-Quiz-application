<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Live Scoreboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body {
  margin: 0;
  min-height: 100vh;
  font-family: "Trebuchet MS", "Segoe UI", sans-serif;
  background:
    radial-gradient(circle at 20% 10%, rgba(42, 89, 255, 0.38), transparent 36%),
    radial-gradient(circle at 90% 90%, rgba(23, 58, 190, 0.34), transparent 40%),
    linear-gradient(135deg, #0a2c95, #082a87 55%, #07246d);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px;
}
.stage {
  width: min(980px, 100%);
}
.score-title {
  margin: 0 auto 18px;
  width: fit-content;
  min-width: 150px;
  text-align: center;
  background: #f8fafc;
  color: #0f172a;
  font-weight: 800;
  border-radius: 3px;
  padding: 7px 14px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.25);
}
.meta {
  display: flex;
  justify-content: center;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 14px;
}
.pill {
  border-radius: 999px;
  padding: 5px 10px;
  font-size: 0.82rem;
  background: rgba(255,255,255,0.15);
}
.list {
  border-radius: 6px;
  overflow: hidden;
  box-shadow: 0 14px 28px rgba(0,0,0,0.3);
}
.score-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  background: rgba(255,255,255,0.95);
  color: #0f172a;
  border-bottom: 1px solid rgba(8, 33, 112, 0.18);
  padding: 9px 14px;
}
.score-row:last-child {
  border-bottom: 0;
}
.left {
  display: flex;
  align-items: center;
  gap: 10px;
  min-width: 0;
}
.avatar {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  border: 1px solid rgba(15, 23, 42, 0.2);
  background: linear-gradient(135deg, #93c5fd, #dbeafe);
}
.name {
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  font-weight: 700;
}
.points {
  font-weight: 800;
}
.empty {
  text-align: center;
  padding: 18px 12px;
  background: rgba(255,255,255,0.92);
  color: #1e293b;
}
.footer-note {
  text-align: center;
  margin-top: 14px;
  opacity: 0.92;
  font-size: 0.86rem;
}
.controls {
  margin-top: 14px;
  display: flex;
  justify-content: center;
  gap: 8px;
  flex-wrap: wrap;
}
@media (max-width: 576px) {
  .score-row {
    padding: 8px 10px;
  }
  .points {
    font-size: 0.95rem;
  }
}
</style>
</head>
<body>
<div class="stage">
  <div class="score-title">Scoreboard</div>
  <div class="meta">
    <span class="pill">{{ quiz_name }}</span>
    <span class="pill" id="qInfo">Question {{ current_question }} / {{ total_questions }}</span>
    <span class="pill">Teacher View</span>
  </div>

  <div id="scoresWrap" class="list">
    {% if scores %}
      {% for s in scores %}
      <div class="score-row">
        <div class="left">
          <span class="avatar"></span>
          <span class="name">{{ s['player_name'] }}</span>
        </div>
        <div class="points">{{ s['score'] }}</div>
      </div>
      {% endfor %}
    {% else %}
    <div class="empty">No submissions yet.</div>
    {% endif %}
  </div>

  <div class="controls">
    <a class="btn btn-light btn-sm" href="{{ url_for('next_question', session_id=session_id) }}">Next Question</a>
  </div>
  <div class="footer-note">Teacher controls next question from here.</div>
</div>

<script>
const sessionId = "{{ session_id }}";

function esc(text) {
  return String(text || "").replace(/[&<>"']/g, (s) => ({
    "&": "&amp;",
    "<": "&lt;",
    ">": "&gt;",
    '"': "&quot;",
    "'": "&#39;"
  }[s]));
}

function renderScores(data) {
  const wrap = document.getElementById("scoresWrap");
  document.getElementById("qInfo").innerText = `Question ${data.current_question} / ${data.total_questions}`;

  if (!data.scores || data.scores.length === 0) {
    wrap.innerHTML = '<div class="empty">No submissions yet.</div>';
    return;
  }

  wrap.innerHTML = data.scores.map((s) => `
    <div class="score-row">
      <div class="left">
        <span class="avatar"></span>
        <span class="name">${esc(s.player_name)}</span>
      </div>
      <div class="points">${s.score}</div>
    </div>
  `).join("");
}

function poll() {
  fetch(`/live_leaderboard_data/${sessionId}`)
    .then(r => r.json())
    .then(data => {
      if (!data.success) return;
      renderScores(data);
    });

  fetch(`/get_current_question/${sessionId}`)
    .then(r => r.json())
    .then(state => {
      if (state.finished) return;
      if (state.started && state.phase === "question") {
        window.location.href = `/teacher_live_quiz/${sessionId}`;
      }
    });
}

setInterval(poll, 2000);
poll();
</script>
</body>
</html>
