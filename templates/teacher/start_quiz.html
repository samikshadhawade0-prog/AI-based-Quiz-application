<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Start Live Quiz</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body{background:linear-gradient(135deg,#ff6ec4,#7873f5);min-height:100vh;font-family:'Segoe UI',sans-serif;color:#fff;}
.wrap{max-width:620px;margin:40px auto;}
.card{background:rgba(255,255,255,.12);backdrop-filter:blur(8px);border-radius:16px;padding:24px;}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <h3>Start: {{ quiz['quiz_name'] }}</h3>
    <form method="POST">
      <div class="mb-3">
        <label class="form-label">Game Mode</label>
        <select name="game_mode" class="form-select">
          <option value="classic">Classic (Individual)</option>
          <option value="team">Team Mode</option>
        </select>
      </div>

      <div class="form-check mb-2"><input class="form-check-input" type="checkbox" name="randomize_questions" id="r1"><label class="form-check-label" for="r1">Randomize question order</label></div>
      <div class="form-check mb-2"><input class="form-check-input" type="checkbox" name="friendly_nicknames" id="r2"><label class="form-check-label" for="r2">Friendly nickname generator</label></div>
      <div class="form-check mb-2"><input class="form-check-input" type="checkbox" name="show_leaderboard" id="r3" checked><label class="form-check-label" for="r3">Show leaderboard</label></div>
      <div class="form-check mb-4"><input class="form-check-input" type="checkbox" name="music_on" id="r4"><label class="form-check-label" for="r4">Music on</label></div>

      <div class="d-grid gap-2">
        <button class="btn btn-success" type="submit">Generate Game PIN & Start Lobby</button>
        <a class="btn btn-outline-light" href="{{ url_for('teacher_dashboard') }}">Back</a>
      </div>
    </form>
  </div>
</div>
</body>
</html>
