<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teacher Results</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    min-height: 100vh;
    color: #fff;
    padding: 20px;
}

.container {
    max-width: 700px;
    margin: auto;
}

.card {
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(12px);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 20px;
    box-shadow: 0 15px 25px rgba(0,0,0,0.3);
}

.bar-container {
    margin-bottom: 15px;
}

.bar-label {
    display: flex;
    justify-content: space-between;
    margin-bottom: 5px;
    font-weight: 600;
}

.bar {
    height: 30px;
    border-radius: 10px;
    background: #22c55e;
    transition: width 0.5s ease;
}

.next-btn {
    display: block;
    text-align: center;
    margin-top: 20px;
    padding: 12px 25px;
    border-radius: 25px;
    background: #facc15;
    color: #000;
    font-weight: 700;
    text-decoration: none;
    transition: transform 0.3s;
}

.next-btn:hover {
    transform: scale(1.05);
}
</style>
</head>
<body>

<div class="container">
    <div class="card">
        <h3 class="text-center mb-3">Question Result</h3>
        <h5 class="mb-4">{{ question.question_text }}</h5>

        {% for option, count in counts.items() %}
        <div class="bar-container">
            <div class="bar-label">
                <span>{{ option }}</span>
                <span>{{ count }} student{{ 's' if count != 1 else '' }}</span>
            </div>
            <div class="bar" style="width: {{ count*10 }}px;"></div>
        </div>
        {% endfor %}

       {% if next_qno > 0 %}
<a href="{{ url_for('attempt_quiz', quiz_id=quiz_id, qno=next_qno) }}" class="next-btn">➡ Next Question</a>
{% else %}
<a href="{{ url_for('teacher_dashboard') }}" class="next-btn">✅ Back to Dashboard</a>
{% endif %}

    </div>
</div>

</body>
</html>
