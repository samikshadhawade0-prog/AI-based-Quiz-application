<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Edit Practice Quiz</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">

<style>
:root{
    --bg:#f6f8ff;
    --card:#ffffff;
    --primary:#4f46e5;
}
[data-theme="colorful"]{
    --bg:#fff7ed;
    --card:#ffffff;
    --primary:#ec4899;
}

body{
    background:var(--bg);
    font-family:'Poppins',sans-serif;
    transition:.3s;
}

.header{
    text-align:center;
    font-size:26px;
    font-weight:800;
    color:var(--primary);
    margin-bottom:15px;
}

.quiz-card{
    background:var(--card);
    border-radius:22px;
    padding:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.08);
    margin-bottom:25px;
    transition:.25s;
}
.quiz-card:hover{
    transform:translateY(-4px);
    box-shadow:0 14px 35px rgba(0,0,0,0.12);
}

.question-input{
    font-size:18px;
    font-weight:600;
    border-radius:14px;
}

.option{
    display:flex;
    align-items:center;
    gap:12px;
    padding:14px;
    border-radius:16px;
    margin-bottom:10px;
    transition:.2s;
}
.option:hover{
    transform:scale(1.02);
}

.option input[type=text]{
    border:none;
    background:transparent;
    outline:none;
    flex:1;
    font-weight:600;
}

.optA{background:#ffe4e6;}
.optB{background:#e0f2fe;}
.optC{background:#dcfce7;}
.optD{background:#fef9c3;}

.option input[type=radio]{transform:scale(1.4);}

.option.correct{
    outline:3px solid #22c55e;
    background:#bbf7d0 !important;
}

.delete-btn{
    background:#ff6b6b;
    color:white;
    border-radius:50px;
    font-weight:600;
}

.add-btn{
    background:#22c55e;
    color:white;
    border-radius:50px;
    font-size:18px;
    font-weight:700;
}

.save-btn{
    background:var(--primary);
    color:white;
    border-radius:50px;
    font-size:20px;
    font-weight:800;
}

.theme-btn{
    border-radius:50px;
    font-weight:600;
}

.back-btn{
    margin-right: 10px;
}

.quiz-info{
    background: var(--card);
    border-radius: 22px;
    padding: 20px;
    margin-bottom: 25px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

.explanation-input{
    font-size: 14px;
    border-radius: 10px;
    margin-bottom: 15px;
}

.header-section{
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 30px;
    flex-wrap: wrap;
    gap: 10px;
}

/* 📱 Mobile spacing */
@media(max-width:576px){
    .quiz-card{padding:16px;}
    .question-input{font-size:16px;}
    .header-section{
        flex-direction: column;
        align-items: stretch;
    }
    .back-btn{
        margin-right: 0;
        margin-bottom: 10px;
    }
}
</style>

<script>
function highlight(rad){
    let box = rad.closest('.quiz-card');
    box.querySelectorAll('.option').forEach(o=>o.classList.remove('correct'));
    rad.closest('.option').classList.add('correct');
}

function addQuestion(){
    let c=document.getElementById("questions");
    let i = Date.now(); // Use timestamp for unique ID to avoid conflicts

    c.insertAdjacentHTML("beforeend",`
    <div class="quiz-card">
        <input class="form-control question-input mb-3"
        name="new_question_text[]" placeholder="Enter your question" required>

        <textarea class="form-control explanation-input"
        name="new_explanation[]" placeholder="Explanation (Optional)" rows="2"></textarea>

        <div class="option optA">
            <input type="radio" name="new_correct_${i}" value="A" onchange="highlight(this)" required>
            <input type="text" name="new_option_${i}[]" placeholder="Option A" required>
        </div>

        <div class="option optB">
            <input type="radio" name="new_correct_${i}" value="B" onchange="highlight(this)" required>
            <input type="text" name="new_option_${i}[]" placeholder="Option B" required>
        </div>

        <div class="option optC">
            <input type="radio" name="new_correct_${i}" value="C" onchange="highlight(this)" required>
            <input type="text" name="new_option_${i}[]" placeholder="Option C" required>
        </div>

        <div class="option optD">
            <input type="radio" name="new_correct_${i}" value="D" onchange="highlight(this)" required>
            <input type="text" name="new_option_${i}[]" placeholder="Option D" required>
        </div>

        <button type="button" class="btn delete-btn w-100 mt-3"
        onclick="this.parentElement.remove()">🗑 Remove Question</button>
    </div>`);
}

function toggleTheme(){
    let b=document.body;
    b.dataset.theme = b.dataset.theme==="colorful"?"":"colorful";
}

function confirmDeleteQuestion(questionId, quizId) {
    Swal.fire({
        title: 'Are you sure?',
        text: "This question will be permanently deleted!",
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#ff6b6b',
        cancelButtonColor: '#6c757d',
        confirmButtonText: 'Yes, delete it!'
    }).then((result) => {
        if (result.isConfirmed) {
            window.location.href = `/delete_practice_question/${questionId}/${quizId}`;
        }
    });
}
</script>
</head>

<body data-theme="">

<div class="container py-4">

<div class="header-section">
    <div class="d-flex align-items-center flex-grow-1">
        <a href="{{ url_for('list_practice_quizzes') }}" class="btn btn-secondary back-btn">← Back</a>
        <div class="header">✏️ Edit Practice Quiz : {{ quiz['quiz_name'] }}</div>
    </div>
    <button type="button" onclick="toggleTheme()" class="btn btn-outline-primary theme-btn">
        🎨 Theme
    </button>
    <button type="button" class="btn btn-danger ms-2" onclick="confirmDeleteQuiz({{ quiz['quiz_id'] }})">🗑 Delete Quiz</button>
    <!-- Hidden form for delete -->
    <form id="deleteForm{{ quiz['quiz_id'] }}" method="POST" action="{{ url_for('delete_practice_quiz', quiz_id=quiz['quiz_id']) }}" style="display:none;"></form>
</div>

<!-- Combined Edit Form -->
<form method="POST" action="{{ url_for('edit_practice_quiz', quiz_id=quiz['quiz_id']) }}">

<!-- Quiz Information Card -->
<div class="quiz-info">
    <h5 class="mb-3">📋 Quiz Information</h5>
    <div class="mb-3">
        <label for="title" class="form-label">Quiz Title</label>
        <input type="text" class="form-control" id="title" name="title" 
               value="{{ quiz['quiz_name'] }}" required>
    </div>
    <div class="mb-3">
        <label for="description" class="form-label">Description</label>
        <textarea class="form-control" id="description" name="description" 
                  rows="2">{{ quiz['description'] or '' }}</textarea>
    </div>
</div>

<!-- Questions Form -->
<div id="questions">

{% for item in questions %}
<div class="quiz-card">
<input type="hidden" name="existing_question_id[]" value="{{ item.question['question_id'] }}">

<input class="form-control question-input mb-3"
name="question_text[]"
value="{{ item.question['question_text'] }}" required>

<textarea class="form-control explanation-input"
name="explanation[]"
rows="2">{{ item.question['explanation'] or '' }}</textarea>

{% for opt in item.options %}
<div class="option
{% if loop.index==1 %}optA{% elif loop.index==2 %}optB
{% elif loop.index==3 %}optC{% else %}optD{% endif %}
{% if opt['is_correct']==1 %}correct{% endif %}">

<input type="radio"
name="correct_option_{{ item.question['question_id'] }}"
value="{{ ['A', 'B', 'C', 'D'][loop.index0] }}"
onchange="highlight(this)"
{% if opt['is_correct']==1 %}checked{% endif %}>

<input type="text"
name="option_text_{{ item.question['question_id'] }}[]"
value="{{ opt['option_text'] }}" required>
</div>
{% endfor %}

<button type="button" class="btn delete-btn w-100 mt-3"
onclick="confirmDeleteQuestion({{ item.question['question_id'] }}, {{ quiz['quiz_id'] }})">
🗑 Delete
</button>

</div>
{% endfor %}

</div>

<button type="button" onclick="addQuestion()" class="btn add-btn w-100 mb-3 mt-3">
➕ Add Question
</button>

<button type="submit" class="btn save-btn w-100">
💾 Save All Changes
</button>
</form>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.js"></script>
<script>
function confirmDeleteQuiz(quizId){
    Swal.fire({
        title: 'Delete quiz?',
        text: 'This will permanently delete the quiz and all its questions.',
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#d33',
        cancelButtonColor: '#3085d6',
        confirmButtonText: 'Yes, delete it'
    }).then((result)=>{
        if(result.isConfirmed){
            document.getElementById('deleteForm' + quizId).submit();
        }
    })
}
</script>

</body>
</html>
